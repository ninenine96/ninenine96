<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 140" width="430" height="140">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0F1C"/>
      <stop offset="100%" stop-color="#080D18"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <rect width="430" height="140" rx="6" fill="url(#bg)"/>
  <rect width="430" height="1.5" rx="1" fill="url(#bar)"/>

  <text x="20" y="36" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="#93C5FD">discord_call_summarizer</text>
  <text x="415" y="36" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="12" fill="#1D4ED8" text-anchor="end">↗</text>

  <text x="20" y="60" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="11" fill="#64748B">Records voice calls, transcribes locally with Whisper,</text>
  <text x="20" y="76" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="11" fill="#64748B">posts AI summaries via Ollama. No cloud APIs.</text>

  <rect x="20" y="100" width="54" height="18" rx="9" fill="#0F1E3D" stroke="#1D4ED8" stroke-width="1"/>
  <text x="47" y="113" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="9" fill="#93C5FD" text-anchor="middle">Python</text>

  <rect x="80" y="100" width="56" height="18" rx="9" fill="#0F1E3D" stroke="#1D4ED8" stroke-width="1"/>
  <text x="108" y="113" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="9" fill="#93C5FD" text-anchor="middle">Whisper</text>

  <rect x="142" y="100" width="52" height="18" rx="9" fill="#0F1E3D" stroke="#1D4ED8" stroke-width="1"/>
  <text x="168" y="113" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="9" fill="#93C5FD" text-anchor="middle">Ollama</text>
