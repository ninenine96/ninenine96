  </g>

  <text x="20" y="40" font-family="'Courier New',Courier,monospace" font-size="13" font-weight="bold" fill="#00CCFF" filter="url(#g)">📷  camera_auto_sync</text>
  <text x="415" y="40" font-family="'Courier New',Courier,monospace" font-size="12" fill="#0057FF" text-anchor="end">↗</text>

  <line x1="20" y1="50" x2="410" y2="50" stroke="#0D2045" stroke-width="1"/>

  <text x="20" y="68" font-family="'Courier New',Courier,monospace" font-size="11" fill="#58A6FF">Plug in your Sony ZV-E10. Walk away.</text>
  <text x="20" y="84" font-family="'Courier New',Courier,monospace" font-size="11" fill="#58A6FF">Windows service syncs everything to Google Drive</text>
