<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 148" width="430" height="148">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060D1F"/>
      <stop offset="100%" stop-color="#080F22"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0057FF"/>
      <stop offset="100%" stop-color="#00CCFF"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="430" height="148" rx="6" fill="url(#bg)"/>
  <rect width="430" height="2" rx="1" fill="url(#bar)"/>

