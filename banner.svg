<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="900" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050C1E"/>
      <stop offset="100%" stop-color="#091425"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0057FF"/>
      <stop offset="100%" stop-color="#00CCFF"/>
    </linearGradient>
    <linearGradient id="blueV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00CCFF"/>
      <stop offset="100%" stop-color="#0057FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulse { 0%,100%{opacity:.65} 50%{opacity:1} }
      @keyframes flicker { 0%,17%,21%,60%,100%{opacity:.85} 18%,20%,59%{opacity:.25} }
      @keyframes scanline { 0%{transform:translateY(-180px)} 100%{transform:translateY(180px)} }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      .bolt1 { animation: flicker 6s ease-in-out infinite; }
      .bolt2 { animation: flicker 6s ease-in-out infinite 1.4s; }
      .scan { animation: scanline 4s linear infinite; }
    </style>
  </defs>

  <!-- BG -->
  <rect width="900" height="180" fill="url(#bg)"/>

  <!-- Scanline overlay -->
  <rect class="scan" x="0" y="0" width="900" height="3" fill="#00CCFF" opacity="0.04"/>

  <!-- Grid -->
  <g opacity="0.1" stroke="#1E6FFF" stroke-width="0.5">
    <line x1="0" y1="36" x2="900" y2="36"/>
    <line x1="0" y1="72" x2="900" y2="72"/>
    <line x1="0" y1="108" x2="900" y2="108"/>
    <line x1="0" y1="144" x2="900" y2="144"/>
    <line x1="180" y1="0" x2="180" y2="180"/>
    <line x1="360" y1="0" x2="360" y2="180"/>
    <line x1="540" y1="0" x2="540" y2="180"/>
    <line x1="720" y1="0" x2="720" y2="180"/>
  </g>

  <!-- Bottom edge glow -->
  <rect x="0" y="170" width="900" height="10" fill="url(#blueV)" opacity="0.4"/>

  <!-- Left bolt -->
  <g class="bolt1" filter="url(#glow)">
    <path d="M 88 22 L 62 96 L 79 96 L 53 158 L 96 78 L 74 78 Z" fill="url(#blue)"/>
  </g>
  <!-- Left bolt glow layer -->
  <g class="bolt1" opacity="0.3">
    <path d="M 88 22 L 62 96 L 79 96 L 53 158 L 96 78 L 74 78 Z" fill="#00CCFF" filter="url(#glow)"/>
  </g>

  <!-- Right bolt -->
  <g class="bolt2" filter="url(#glow)">
    <path d="M 812 22 L 838 96 L 821 96 L 847 158 L 804 78 L 826 78 Z" fill="url(#blue)"/>
  </g>
  <g class="bolt2" opacity="0.3">
    <path d="M 812 22 L 838 96 L 821 96 L 847 158 L 804 78 L 826 78 Z" fill="#00CCFF" filter="url(#glow)"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#00CCFF" stroke-width="2" fill="none" opacity="0.8" class="pulse">
    <path d="M 16 16 L 16 50 M 16 16 L 50 16"/>
    <path d="M 884 16 L 884 50 M 884 16 L 850 16"/>
    <path d="M 16 164 L 16 130 M 16 164 L 50 164"/>
    <path d="M 884 164 L 884 130 M 884 164 L 850 164"/>
  </g>
  <!-- Corner dots -->
  <g fill="#00CCFF" class="pulse">
    <circle cx="16" cy="16" r="2.5" opacity="0.9"/>
    <circle cx="884" cy="16" r="2.5" opacity="0.9"/>
    <circle cx="16" cy="164" r="2.5" opacity="0.9"/>
    <circle cx="884" cy="164" r="2.5" opacity="0.9"/>
  </g>

  <!-- Accent lines flanking subtitle -->
  <g class="pulse">
    <line x1="130" y1="112" x2="255" y2="112" stroke="url(#blue)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="128" cy="112" r="2" fill="#00CCFF" opacity="0.6"/>
    <line x1="645" y1="112" x2="770" y2="112" stroke="url(#blue)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="772" cy="112" r="2" fill="#00CCFF" opacity="0.6"/>
  </g>

  <!-- Main name -->
  <text x="450" y="84"
    font-family="'Courier New', Courier, monospace"
    font-size="50" font-weight="bold"
    text-anchor="middle"
    fill="url(#blue)"
    filter="url(#glow)"
    class="pulse">Mohammad Rohan</text>

  <!-- Subtitle -->
  <text x="450" y="118"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    text-anchor="middle"
    fill="#58A6FF"
    letter-spacing="6">SENIOR DATA CONSULTANT</text>

</svg>
