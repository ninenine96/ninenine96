<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070C18"/>
      <stop offset="100%" stop-color="#0B1222"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#1D4ED8"/>
      <stop offset="70%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <style>
      @keyframes fade { 0%,100%{opacity:.7} 50%{opacity:1} }
      .n { animation: fade 4s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="900" height="160" fill="url(#bg)"/>

  <!-- corner marks — minimal -->
  <g stroke="#1D4ED8" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M 20 20 L 20 38 M 20 20 L 38 20"/>
    <path d="M 880 20 L 880 38 M 880 20 L 862 20"/>
    <path d="M 20 140 L 20 122 M 20 140 L 38 140"/>
    <path d="M 880 140 L 880 122 M 880 140 L 862 140"/>
  </g>

  <!-- name -->
  <text x="450" y="82"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="48" font-weight="700"
    text-anchor="middle"
    fill="url(#name)"
    class="n">Mohammad Rohan</text>

  <!-- thin rule under name -->
  <rect x="250" y="96" width="400" height="1" fill="url(#line)" opacity="0.6"/>

  <!-- subtitle -->
  <text x="450" y="122"
    font-family="'Segoe UI', Arial, Helvetica, sans-serif"
    font-size="13" font-weight="400"
    text-anchor="middle"
    fill="#475569"
    letter-spacing="3">SENIOR DATA CONSULTANT</text>
</svg>
