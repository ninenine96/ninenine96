<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 150" width="900" height="150">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070C18"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0"/>
    </linearGradient>
    <style>
      @keyframes f { 0%,100%{opacity:.75} 50%{opacity:1} }
      .n { animation: f 5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="900" height="150" fill="url(#bg)"/>
  <text x="450" y="78" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="46" font-weight="700" text-anchor="middle" fill="url(#name)" class="n">Mohammad Rohan</text>
  <rect x="300" y="92" width="300" height="1" fill="url(#rule)"/>
  <text x="450" y="116" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="12" font-weight="400" text-anchor="middle" fill="#334155" letter-spacing="4">SENIOR DATA CONSULTANT</text>
</svg>
